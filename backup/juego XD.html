<DOCTYPE html>
    <html>

    <head>
        <meta charset="utf-8">
        <title> Mokepon </title>

        <script src="./js/juegoXD.js"> </script>

    </head>

    <body>
        <h1>Mokepon OwO</h1>
        <section id="seleccionar-Mascotas">
            <h2>Elije a tu mascota:</h2>

            <input type="radio" name="mascota" id='hipodoge' />
            <label for="hipodoge">Hipodoge -> Agua</label> </br>

            <input type="radio" name="mascota" id='capipepo' />
            <label for="capipepo">Capipepo -> Planta</label> </br>

            <input type="radio" name="mascota" id='ratigueya' />
            <label for="ratigueya">Ratigueya -> Fuego</label> </br>

            <input type="radio" name="mascota" id='langostelvis' />
            <label for="langostelvis">Langostelvis -> Agua y fuegoa</label> </br>

            <input type="radio" name="mascota" id='pydos' />
            <label for="pydos">Pydos -> Fuego y Plantaos </label> </br>

            <button id="boton-mascotas"> Seleccionar </button>

        </section>

        <section id="seleccionar-ataque">

            <p> Tu mascota tiene <span>3</span> vidas </p>
            <p> La mascota del enemigo tiene <span>3</span> vidas </p>

            <p>

                <button id="boton-fuego"> Fuego </button>
                <button id="boton-agua"> Agua </button>
                <button id="boton-planta"> Planta </button>

            </p>
        </section>

        <section id="mensajes">

            <p>Tu mascota a ataco con FUEGO, la mascota del enemigo ataco con planta - Ganaste </p>

        </section>

        <section id="reiniciar">

            <button id="boton-reiniciar"> Reiniciar </button>

        </section>

    </body>

    </html>
